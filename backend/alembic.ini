[alembic]
script_location = migrations
file_template = %%(year)d_%%(month)d_%%(day)d_%%(hour)d%%(minute)d-%%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
# DB URL is read from app.core.config.settings in env.py — do NOT hardcode here.
# sqlalchemy.url is left empty on purpose.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
