services:
  # 1. Main API Service (Includes Workers via start.sh)
  - type: web
    name: ark-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ark-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ark-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard manually
      - key: PORT
        value: 8000

# 2. Redis Instance
  - type: redis
    name: ark-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

# 3. PostgreSQL Database
databases:
  - name: ark-db
    plan: free
